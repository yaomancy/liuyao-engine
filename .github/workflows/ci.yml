name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (with dev deps for differential cross-check)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests (incl. najia differential cross-validation)
        run: pytest -q
